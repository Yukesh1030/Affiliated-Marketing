<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | STACKLY</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-page">

    <div class="auth-header">
        <a href="index.html"><i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i> Back to Home</a>
    </div>

    <div class="auth-container">
        <div class="auth-logo">STACKLY</div>
        
        <div class="auth-titles">
            <h1 class="serif">Create Account</h1>
            <p>Join the future of affiliate marketing</p>
        </div>

        <form class="auth-form" id="signupForm">
            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" placeholder="John Doe" required>
                <div class="error-text" id="nameError">Full name is required</div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
                <div class="error-text" id="emailError">Please enter a valid email</div>
            </div>

            <div class="form-group">
                <label for="role">Join As</label>
                <select id="role">
                    <option value="Customer">Customer</option>
                    <option value="Seller">Seller</option>
                </select>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
                <div class="error-text" id="passwordError">Password must be at least 6 characters</div>
            </div>
            
            <div class="auth-terms">
                <input type="checkbox" id="terms" required>
                <label for="terms">I agree to the <a href="404.html">Terms of Service</a> and <a href="404.html">Privacy Policy</a></label>
            </div>

            <button type="submit" class="auth-btn">
                Create Account
            </button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="Login.html">Login</a>
        </div>
    </div>

    <script>
        lucide.createIcons();

        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const fullname = document.getElementById('fullname');
            const email = document.getElementById('email');
            const password = document.getElementById('password');
            const terms = document.getElementById('terms');
            let isValid = true;

            if (!fullname.value.trim()) {
                fullname.classList.add('input-error');
                document.getElementById('nameError').style.display = 'block';
                isValid = false;
            } else {
                fullname.classList.remove('input-error');
                document.getElementById('nameError').style.display = 'none';
            }

            if (!email.value || !email.value.includes('@')) {
                email.classList.add('input-error');
                document.getElementById('emailError').style.display = 'block';
                isValid = false;
            } else {
                email.classList.remove('input-error');
                document.getElementById('emailError').style.display = 'none';
            }

            if (password.value.length < 6) {
                password.classList.add('input-error');
                document.getElementById('passwordError').style.display = 'block';
                isValid = false;
            } else {
                password.classList.remove('input-error');
                document.getElementById('passwordError').style.display = 'none';
            }

            if (!terms.checked) {
                // native HTML5 required handles this, but for extra measure
                isValid = false;
            }

            if (isValid) {
                // Simulate creation and redirect
                const btn = document.querySelector('.auth-btn');
                btn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite;"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>';
                
                setTimeout(() => {
                    window.location.href = 'Login.html';
                }, 800);
            }
        });
    </script>
    <style>
        .serif { font-family: 'Playfair Display', serif; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</body>
</html>
